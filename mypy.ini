[mypy]
python_version = 3.11
plugins = pydantic.mypy
ignore_missing_imports = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = False
check_untyped_defs = True

[mypy-tests.*]
disable_error_code = no-untyped-def

# Builtin plugins are being migrated to DeepTradePluginOfficial (see
# docs/distribution-and-plugin-install-design.md §8). Their type-correctness
# will be re-enforced in the new repo's CI; in the main repo we suppress
# typecheck for these soon-to-be-removed paths to keep CI green during the
# multi-PR migration. Remove these blocks at PR-8 cutover when the dirs are
# physically deleted.
[mypy-deeptrade.strategies_builtin.*]
ignore_errors = True

[mypy-deeptrade.channels_builtin.*]
ignore_errors = True

[pydantic-mypy]
init_forbid_extra = True
init_typed = True
