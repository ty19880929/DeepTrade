plugin_id: volume-anomaly
name: 成交量异动策略
version: 0.6.0
type: strategy
api_version: "1"
entrypoint: volume_anomaly.plugin:VolumeAnomalyPlugin
description: 主板成交量异动筛选 + LLM 主升浪启动预测（screen / analyze / prune 三模式）
author: DeepTrade

permissions:
  tushare_apis:
    required:
      - stock_basic
      - trade_cal
      - daily
      - daily_basic
      - stock_st
    optional:
      - suspend_d
      - moneyflow
      - limit_list_d
      - limit_cpt_list
      - top_list
      - anns_d
      - adj_factor
      - index_daily
  llm: true
  llm_tools: false

migrations:
  - version: "20260430_001"
    file: migrations/20260430_001_init.sql
    checksum: "sha256:62787c9ef661d0ddd6054b656fcc310f5e139dd9d1dfea70dc3b0359c321bd5f"
  - version: "20260601_001"
    file: migrations/20260601_001_realized_returns.sql
    checksum: "sha256:da2b1a80fb87c2261224c7efb04de9e95bf1d274db32eab73a6e162b8bb9931c"
  - version: "20260601_002"
    file: migrations/20260601_002_dimension_scores.sql
    checksum: "sha256:5fc53bc4de649b884337014b4f6c9a872b4178173fdbc8dcc9fcb56b14a2b5b9"

tables:
  - name: va_watchlist
    description: 异动筛选后的待追踪标的池（每只一行，PK=ts_code）
    purge_on_uninstall: true
  - name: va_anomaly_history
    description: 历次异动筛选命中明细（审计用）
    purge_on_uninstall: true
  - name: va_stage_results
    description: 走势分析（LLM）阶段的结构化结果
    purge_on_uninstall: true
  - name: va_runs
    description: 本插件 run 历史（替代框架 strategy_runs）
    purge_on_uninstall: true
  - name: va_events
    description: 本插件 run 事件流（替代框架 strategy_events）
    purge_on_uninstall: true
  - name: va_realized_returns
    description: T+N 事后实际收益指标（PK=anomaly_date+ts_code）
    purge_on_uninstall: true
